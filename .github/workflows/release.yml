name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-package:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: maven

      - name: Check code signing secrets
        shell: pwsh
        env:
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_PFX_BASE64)) {
            throw "Missing WINDOWS_CODESIGN_PFX_BASE64 repository secret."
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_PASSWORD)) {
            throw "Missing WINDOWS_CODESIGN_PASSWORD repository secret."
          }

      - name: Prepare code signing certificate
        shell: pwsh
        env:
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
        run: |
          New-Item -ItemType Directory -Force -Path target/codesign | Out-Null
          [IO.File]::WriteAllBytes(
            "target/codesign/opcoach-codesign.pfx",
            [Convert]::FromBase64String($env:WINDOWS_CODESIGN_PFX_BASE64)
          )

      - name: Locate SignTool
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            throw "signtool.exe not found on the Windows runner."
          }
          "WINDOWS_SIGNTOOL=$($signtool.FullName)" >> $env:GITHUB_ENV

      - name: Build Windows package
        shell: pwsh
        env:
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          .\mvnw.cmd -Pwindows-dist -DskipTests `
            "-Dwindows.sign.skip=false" `
            "-Dwindows.sign.tool=$env:WINDOWS_SIGNTOOL" `
            "-Dwindows.sign.cert=target\codesign\opcoach-codesign.pfx" `
            "-Dwindows.sign.password=$env:WINDOWS_CODESIGN_PASSWORD" `
            clean package

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: opcoach-mcp-mail-windows-x64
          path: |
            target/OPCoach-MCP-Mail-*-windows-x64.zip
            target/OPCoach-MCP-Mail-*-windows-x64.zip.sha256

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/OPCoach-MCP-Mail-*-windows-x64.zip
            target/OPCoach-MCP-Mail-*-windows-x64.zip.sha256
