name: Verify

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  maven-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: maven

      - name: Verify
        run: ./mvnw clean verify
